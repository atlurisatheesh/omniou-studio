version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloneai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloneai
      POSTGRES_USER: cloneai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloneai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloneai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloneai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: cloneai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cloneai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cloneai_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (Local LLM for Script AI) ───────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cloneai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Backend API (FastAPI) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloneai-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://cloneai:${POSTGRES_PASSWORD:-cloneai_secret}@postgres:5432/cloneai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-cloneai}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-cloneai_secret}
      - MINIO_BUCKET=cloneai-assets
      - USE_MINIO=true
      - MODEL_CACHE_DIR=/app/models
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - model_cache:/app/models
      - uploads:/app/uploads
      - outputs:/app/outputs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Celery Worker ─────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloneai-celery
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=info --concurrency=2 --pool=prefork
    environment:
      - DATABASE_URL=postgresql+asyncpg://cloneai:${POSTGRES_PASSWORD:-cloneai_secret}@postgres:5432/cloneai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-cloneai}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-cloneai_secret}
      - MODEL_CACHE_DIR=/app/models
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
    volumes:
      - model_cache:/app/models
      - uploads:/app/uploads
      - outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Frontend (Next.js) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloneai-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-me}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cloneai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  model_cache:
  uploads:
  outputs:
