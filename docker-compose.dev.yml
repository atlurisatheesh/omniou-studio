# Development docker-compose (no GPU required)
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloneai-postgres-dev
    environment:
      POSTGRES_DB: cloneai
      POSTGRES_USER: cloneai
      POSTGRES_PASSWORD: cloneai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cloneai-redis-dev
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: cloneai-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cloneai
      MINIO_ROOT_PASSWORD: cloneai_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev:/data

volumes:
  postgres_dev:
  minio_dev:
